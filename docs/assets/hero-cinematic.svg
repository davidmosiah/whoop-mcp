<svg width="960" height="980" viewBox="0 0 960 980" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">WHOOP signal flowing into an AI decision layer</title>
  <desc id="desc">A cinematic abstract interface showing recovery, sleep and strain signals becoming an AI daily plan.</desc>
  <defs>
    <radialGradient id="core" cx="50%" cy="44%" r="58%">
      <stop stop-color="#D7FF69" stop-opacity="0.95"/>
      <stop offset="0.32" stop-color="#76E7B1" stop-opacity="0.72"/>
      <stop offset="0.7" stop-color="#08120D" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#020403" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#F6F1E0" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#F6F1E0" stop-opacity="0.035"/>

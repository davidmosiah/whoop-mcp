<svg width="1100" height="360" viewBox="0 0 1100 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">WHOOP MCP agent workflow</title>
  <desc id="desc">WHOOP OAuth tokens remain local while WHOOP MCP exposes recovery, sleep and strain summaries to an agent.</desc>
  <rect width="1100" height="360" rx="24" fill="#111827"/>
  <rect x="36" y="40" width="250" height="280" rx="18" fill="#3F0D12" stroke="#FB7185" stroke-width="2"/>
  <rect x="425" y="40" width="250" height="280" rx="18" fill="#064E3B" stroke="#34D399" stroke-width="2"/>
  <rect x="814" y="40" width="250" height="280" rx="18" fill="#1E1B4B" stroke="#818CF8" stroke-width="2"/>
  <text x="161" y="91" text-anchor="middle" fill="#FFE4E6" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">WHOOP API</text>
  <text x="161" y="132" text-anchor="middle" fill="#FECDD3" font-family="Inter, Arial, sans-serif" font-size="18">Recovery score</text>
  <text x="161" y="164" text-anchor="middle" fill="#FECDD3" font-family="Inter, Arial, sans-serif" font-size="18">Sleep stages</text>
  <text x="161" y="196" text-anchor="middle" fill="#FECDD3" font-family="Inter, Arial, sans-serif" font-size="18">Strain + HRV</text>
  <text x="550" y="91" text-anchor="middle" fill="#D1FAE5" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">whoop-mcp</text>
  <text x="550" y="132" text-anchor="middle" fill="#A7F3D0" font-family="Inter, Arial, sans-serif" font-size="18">OAuth handled locally</text>
  <text x="550" y="164" text-anchor="middle" fill="#A7F3D0" font-family="Inter, Arial, sans-serif" font-size="18">Connection status</text>
  <text x="550" y="196" text-anchor="middle" fill="#A7F3D0" font-family="Inter, Arial, sans-serif" font-size="18">Daily + weekly summaries</text>
  <text x="939" y="91" text-anchor="middle" fill="#E0E7FF" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">AI agent</text>
  <text x="939" y="132" text-anchor="middle" fill="#C7D2FE" font-family="Inter, Arial, sans-serif" font-size="18">Sleep plan</text>
  <text x="939" y="164" text-anchor="middle" fill="#C7D2FE" font-family="Inter, Arial, sans-serif" font-size="18">Training adjustment</text>
  <text x="939" y="196" text-anchor="middle" fill="#C7D2FE" font-family="Inter, Arial, sans-serif" font-size="18">Recovery-aware brief</text>
  <path d="M306 180H405" stroke="#E5E7EB" stroke-width="5" stroke-linecap="round"/>
  <path d="M392 165L409 180L392 195" stroke="#E5E7EB" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M695 180H794" stroke="#E5E7EB" stroke-width="5" stroke-linecap="round"/>
  <path d="M781 165L798 180L781 195" stroke="#E5E7EB" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="550" y="292" text-anchor="middle" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="18">npx -y whoop-mcp-unofficial setup && npx -y whoop-mcp-unofficial auth</text>
</svg>
